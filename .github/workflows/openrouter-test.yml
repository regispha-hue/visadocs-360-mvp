name: Testar OpenRouter Connection

on: 
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test-openrouter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Testar conexão com OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Testando conexão com OpenRouter..."
          curl -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/regispha-hue/visadocs-360-mvp" \
            -d '{
              "model": "openai/gpt-3.5-turbo",
              "messages": [{"role": "user", "content": "Responda com: Conexão OpenRouter OK!"}]
            }' \
            -w "\nStatus: %{http_code}\n"
